version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ridenow-db
    environment:
      POSTGRES_USER: ridenow_user
      POSTGRES_PASSWORD: ridenow_password
      POSTGRES_DB: ridenow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ridenow-backend
    environment:
      DATABASE_URL: postgresql://ridenow_user:ridenow_password@postgres:5432/ridenow
      NODE_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ridenow-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  default:
    name: ridenow-network